name: Daily Bio Dashboard (News + Reports + Approvals)

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser requests python-dateutil beautifulsoup4
      - run: python3 build_dashboard.py
      - name: Commit dashboard to repo
        run: |
          git config user.name "news-bot"
          git config user.email "bot@example.com"
          git add digests/ docs/
          git commit -m "Daily dashboard update $(date +%Y-%m-%d)" || echo "no changes"
          git push
